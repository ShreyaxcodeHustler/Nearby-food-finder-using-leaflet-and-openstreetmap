<!DOCTYPE  html>
<html>
    <head>
        <title> PAV BHAJI </title>
        <link rel="stylesheet" 
        href="style.css" ></link>
        <link rel="stylesheet"        
         href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"></link>
    </head>
    <body>
        <label for="radius">Search Radius:</label>
        <select id="radius">
            <option value="1000">1 km</option>
            <option value="5000" selected>5 km</option>
            <option value="10000">10 km</option>
        </select>
        <h1>Pav Bhaji Finder</h1>
        <button id="locationButton">Find Nearby Pav Bhaji</button>

        <p id="output">
            Location not detected yet.
        </p>
        <h2>Nearby Places</h2>

        <ul id="placesList"></ul>
        <div id="map"></div>
        <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

        <script src="script.js"></script>

    </body>
</html>
